<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="goldBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    <linearGradient id="goldTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8DC"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 底座阴影 -->
  <ellipse cx="16" cy="28" rx="12" ry="3" fill="#8B4513" opacity="0.3"/>
  
  <!-- 印章底座 -->
  <rect x="4" y="14" width="24" height="14" rx="2" fill="url(#goldBase)" stroke="#B8860B" stroke-width="1" filter="url(#shadow)"/>
  
  <!-- 龙身简化 -->
  <path d="M8 14 Q12 10 16 12 Q20 10 24 14" stroke="#B8860B" stroke-width="1.5" fill="none"/>
  <path d="M10 14 Q12 11 14 14 M18 14 Q20 11 22 14" stroke="#B8860B" stroke-width="1" fill="none"/>
  
  <!-- 龙首简化 -->
  <ellipse cx="16" cy="10" rx="8" ry="5" fill="url(#goldTop)" stroke="#B8860B" stroke-width="1"/>
  <circle cx="13" cy="9" r="1.5" fill="#8B0000"/>
  <circle cx="19" cy="9" r="1.5" fill="#8B0000"/>
  <path d="M14 12 Q16 13 18 12" stroke="#8B0000" stroke-width="1" fill="none"/>
  
  <!-- 龙角 -->
  <path d="M12 6 L10 4 M20 6 L22 4" stroke="#B8860B" stroke-width="1.5" fill="none"/>
  <path d="M14 5 L13 3 M18 5 L19 3" stroke="#B8860B" stroke-width="1" fill="none"/>
  
  <!-- 龙须 -->
  <path d="M10 11 Q8 13 9 15 M22 11 Q24 13 23 15" stroke="#B8860B" stroke-width="0.8" fill="none"/>
  
  <!-- 底部印文 -->
  <rect x="8" y="18" width="16" height="8" rx="1" fill="#8B0000" opacity="0.8"/>
  <text x="16" y="24" font-size="6" fill="#FFD700" text-anchor="middle" font-family="serif" font-weight="bold">龍</text>
  
  <!-- 高光 -->
  <rect x="6" y="15" width="6" height="2" rx="0.5" fill="#FFF" opacity="0.4"/>
</svg>